<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kakao Feed Observer</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FAE100;
    --yellow-dim: #c9b400;
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --text-muted: #888;
    --private: #ff4d4d;
    --public: #4dff91;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.5px;
    color: var(--yellow);
  }

  .logo-icon {
    width: 30px;
    height: 30px;
    background: var(--yellow);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000;
    font-size: 16px;
    font-weight: 700;
  }

  /* ── MAIN LAYOUT ── */
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ── VIEW TOGGLE ── */
  .view-toggle {
    display: inline-flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 4px;
    gap: 2px;
    margin-bottom: 32px;
  }

  .toggle-btn {
    padding: 8px 20px;
    border-radius: 50px;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--text-muted);
  }

  .toggle-btn.active {
    background: var(--yellow);
    color: #000;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .stat-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .dot-public { background: var(--public); }
  .dot-private { background: var(--private); }
  .dot-total { background: var(--yellow); }

  /* ── GRID ── */
  .grid-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 32px;
  }

  @media (max-width: 640px) {
    .grid-section { grid-template-columns: 1fr; }
  }

  .grid-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .panel-header span:last-child {
    color: var(--yellow);
  }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    padding: 2px;
    min-height: 180px;
  }

  .photo-cell {
    aspect-ratio: 1;
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .photo-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }

  .photo-cell:hover img { transform: scale(1.05); }

  .photo-cell .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    background: rgba(0,0,0,0.5);
    font-size: 20px;
  }

  .photo-cell:hover .overlay { opacity: 1; }

  .private-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    background: var(--private);
    border-radius: 4px;
    padding: 2px 5px;
    font-size: 9px;
    font-weight: 700;
    color: white;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.3px;
  }

  .photo-cell.is-private {
    opacity: 0.45;
  }

  .photo-cell.hidden-slot {
    background: var(--surface2);
    border: 1.5px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--border);
    font-size: 20px;
  }

  .empty-grid {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 150px;
    color: var(--text-muted);
    font-size: 13px;
    gap: 8px;
  }

  /* ── ADD PANEL ── */
  .add-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 32px;
  }

  .add-panel h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .add-panel h3::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 14px;
    background: var(--yellow);
    border-radius: 2px;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-muted);
    font-size: 13px;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--yellow);
    background: rgba(250,225,0,0.04);
    color: var(--yellow);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon { font-size: 32px; margin-bottom: 8px; }

  .form-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .preview-thumb {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    object-fit: cover;
    border: 2px solid var(--border);
    display: none;
  }

  .privacy-toggle {
    display: flex;
    gap: 8px;
  }

  .privacy-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .privacy-btn.selected-public {
    border-color: var(--public);
    color: var(--public);
    background: rgba(77,255,145,0.08);
  }

  .privacy-btn.selected-private {
    border-color: var(--private);
    color: var(--private);
    background: rgba(255,77,77,0.08);
  }

  .add-btn {
    padding: 10px 24px;
    background: var(--yellow);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: auto;
  }

  .add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(250,225,0,0.3); }
  .add-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── POST LIST ── */
  .post-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 32px;
  }

  .post-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    transition: all 0.2s;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .post-item:hover { border-color: var(--yellow); }

  .post-thumb {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .post-info {
    flex: 1;
    min-width: 0;
  }

  .post-index {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 2px;
  }

  .post-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .privacy-switch {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    flex-shrink: 0;
  }

  .switch {
    position: relative;
    width: 40px;
    height: 22px;
  }

  .switch input { display: none; }

  .switch-track {
    position: absolute;
    inset: 0;
    border-radius: 50px;
    background: var(--border);
    cursor: pointer;
    transition: background 0.2s;
  }

  .switch input:checked + .switch-track { background: var(--private); }

  .switch-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: white;
    transition: transform 0.2s;
    pointer-events: none;
  }

  .switch input:checked ~ .switch-thumb { transform: translateX(18px); }

  .privacy-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    min-width: 40px;
    text-align: center;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.2s;
  }

  .delete-btn:hover { color: var(--private); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--yellow);
    color: #000;
    padding: 10px 24px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    transition: transform 0.3s;
    z-index: 200;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 32px 0;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">K</div>
    Kakao Feed Observer
  </div>
  <div style="font-size:11px; color:var(--text-muted); font-family:'DM Mono',monospace;">v0.1 MVP</div>
</header>

<div class="container">

  <!-- 뷰 토글 -->
  <div class="view-toggle">
    <button class="toggle-btn active" onclick="setView('owner')">👤 내 시점 (전체)</button>
    <button class="toggle-btn" onclick="setView('visitor')">🧑‍🤝‍🧑 방문자 시점</button>
  </div>

  <!-- 통계 -->
  <div class="stats-bar">
    <div class="stat-chip"><div class="dot dot-total"></div><span id="stat-total">0</span> 전체</div>
    <div class="stat-chip"><div class="dot dot-public"></div><span id="stat-public">0</span> 공개</div>
    <div class="stat-chip"><div class="dot dot-private"></div><span id="stat-private">0</span> 나만보기</div>
  </div>

  <!-- 그리드 미리보기 -->
  <div class="section-title">그리드 미리보기</div>
  <div class="grid-section">
    <div class="grid-panel">
      <div class="panel-header">
        <span>내 시점</span>
        <span id="owner-count">0장</span>
      </div>
      <div class="photo-grid" id="owner-grid">
        <div class="empty-grid"><span>📭</span><span>게시물을 추가해보세요</span></div>
      </div>
    </div>
    <div class="grid-panel">
      <div class="panel-header">
        <span>방문자 시점</span>
        <span id="visitor-count">0장</span>
      </div>
      <div class="photo-grid" id="visitor-grid">
        <div class="empty-grid"><span>👁</span><span>공개 게시물이 없습니다</span></div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 게시물 추가 -->
  <div class="add-panel">
    <h3>게시물 추가</h3>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" multiple>
      <div class="drop-icon">📷</div>
      <div>사진을 클릭하거나 드래그해서 올려주세요</div>
      <div style="font-size:11px; margin-top:4px; color:var(--text-muted);">여러 장 동시 선택 가능</div>
    </div>
    <div class="form-row" id="form-row" style="display:none;">
      <img class="preview-thumb" id="preview-thumb" style="display:block;">
      <div id="multi-count" style="font-size:12px; color:var(--text-muted); display:none;"></div>
      <div class="privacy-toggle">
        <button class="privacy-btn selected-public" id="btn-public" onclick="setPrivacy(false)">🌍 공개</button>
        <button class="privacy-btn" id="btn-private" onclick="setPrivacy(true)">🔒 나만보기</button>
      </div>
      <button class="add-btn" id="add-btn" onclick="addPost()">추가하기</button>
    </div>
  </div>

  <!-- 게시물 목록 -->
  <div class="section-title">등록된 게시물 목록 (최신순)</div>
  <div class="post-list" id="post-list">
    <div class="empty-state">
      <div class="empty-icon">🖼</div>
      <p>아직 등록된 게시물이 없어요.<br>위에서 사진을 추가해보세요!</p>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let posts = JSON.parse(localStorage.getItem('kakaoObserverPosts') || '[]');
let pendingFiles = [];
let isPrivate = false;
let currentView = 'owner';

// ── SAVE ──
function save() {
  localStorage.setItem('kakaoObserverPosts', JSON.stringify(posts));
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── VIEW TOGGLE ──
function setView(v) {
  currentView = v;
  document.querySelectorAll('.toggle-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && v === 'owner') || (i === 1 && v === 'visitor'));
  });
  renderGrids();
}

// ── PRIVACY ──
function setPrivacy(priv) {
  isPrivate = priv;
  document.getElementById('btn-public').className = 'privacy-btn' + (!priv ? ' selected-public' : '');
  document.getElementById('btn-private').className = 'privacy-btn' + (priv ? ' selected-private' : '');
}

// ── FILE INPUT ──
document.getElementById('file-input').addEventListener('change', function(e) {
  handleFiles(Array.from(e.target.files));
});

const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
});

function handleFiles(files) {
  if (!files.length) return;
  pendingFiles = files;
  const formRow = document.getElementById('form-row');
  formRow.style.display = 'flex';

  if (files.length === 1) {
    const reader = new FileReader();
    reader.onload = e => {
      const thumb = document.getElementById('preview-thumb');
      thumb.src = e.target.result;
      thumb.style.display = 'block';
    };
    reader.readAsDataURL(files[0]);
    document.getElementById('multi-count').style.display = 'none';
  } else {
    const reader = new FileReader();
    reader.onload = e => {
      const thumb = document.getElementById('preview-thumb');
      thumb.src = e.target.result;
      thumb.style.display = 'block';
    };
    reader.readAsDataURL(files[0]);
    const mc = document.getElementById('multi-count');
    mc.textContent = `외 ${files.length - 1}장 더`;
    mc.style.display = 'block';
  }
}

// ── ADD POST ──
// 이미지를 canvas로 압축해서 용량 줄이기 (localStorage 5MB 제한 대응)
function compressImage(file, maxSize = 800, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('파일 읽기 실패: ' + file.name));
    reader.onload = e => {
      const img = new Image();
      img.onerror = () => reject(new Error('이미지 로드 실패: ' + file.name));
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxSize || h > maxSize) {
          if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
          else       { w = Math.round(w * maxSize / h); h = maxSize; }
        }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function addPost() {
  if (!pendingFiles.length) return;

  const btn = document.getElementById('add-btn');
  btn.disabled = true;

  const total = pendingFiles.length;
  const newPosts = [];

  for (let idx = 0; idx < pendingFiles.length; idx++) {
    const file = pendingFiles[idx];
    btn.textContent = `압축 중... (${idx + 1}/${total})`;
    try {
      const src = await compressImage(file);
      newPosts.push({
        id: crypto.randomUUID(),
        src,
        name: file.name,
        isPrivate: isPrivate,
        createdAt: Date.now() + idx
      });
    } catch(err) {
      showToast('⚠️ ' + err.message);
    }
  }

  // 최신순이므로 앞에 추가 (순서 보존)
  posts = [...newPosts, ...posts];

  try {
    save();
  } catch(e) {
    // localStorage 용량 초과 시 오래된 이미지 src만 비워서라도 저장
    showToast('⚠️ 저장 공간 부족 — 일부 이미지가 세션에만 유지됩니다');
  }

  renderAll();
  showToast(`✅ ${newPosts.length}장 추가됨`);

  // 폼 초기화
  pendingFiles = [];
  document.getElementById('form-row').style.display = 'none';
  document.getElementById('preview-thumb').style.display = 'none';
  document.getElementById('file-input').value = '';
  btn.disabled = false;
  btn.textContent = '추가하기';
  setPrivacy(false);
}

// ── TOGGLE PRIVACY ──
function togglePrivacy(id) {
  const post = posts.find(p => String(p.id) === String(id));
  if (post) {
    post.isPrivate = !post.isPrivate;
    save();
    renderAll();
    showToast(post.isPrivate ? '🔒 나만보기로 변경' : '🌍 공개로 변경');
  }
}

// ── DELETE ──
function deletePost(id) {
  posts = posts.filter(p => String(p.id) !== String(id));
  save();
  renderAll();
  showToast('🗑 삭제됨');
}

// ── RENDER GRIDS ──
function renderGrids() {
  const publicPosts = posts.filter(p => !p.isPrivate);
  const ownerGrid = document.getElementById('owner-grid');
  const visitorGrid = document.getElementById('visitor-grid');

  // Owner grid (모든 게시물, 나만보기는 흐리게) - 제한 없음
  if (posts.length === 0) {
    ownerGrid.innerHTML = '<div class="empty-grid"><span>📭</span><span>게시물을 추가해보세요</span></div>';
  } else {
    ownerGrid.innerHTML = posts.map(p => `
      <div class="photo-cell ${p.isPrivate ? 'is-private' : ''}">
        <img src="${p.src}" alt="">
        ${p.isPrivate ? '<div class="private-badge">나만</div>' : ''}
        <div class="overlay">${p.isPrivate ? '🔒' : '👁'}</div>
      </div>
    `).join('');
  }

  // Visitor grid (공개만) - 제한 없음
  if (publicPosts.length === 0) {
    visitorGrid.innerHTML = '<div class="empty-grid"><span>👁</span><span>공개 게시물이 없습니다</span></div>';
  } else {
    visitorGrid.innerHTML = publicPosts.map(p => `
      <div class="photo-cell">
        <img src="${p.src}" alt="">
        <div class="overlay">👁</div>
      </div>
    `).join('');
  }

  document.getElementById('owner-count').textContent = `${posts.length}장`;
  document.getElementById('visitor-count').textContent = `${publicPosts.length}장`;
}

// ── RENDER POST LIST ──
function renderPostList() {
  const list = document.getElementById('post-list');
  if (posts.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🖼</div>
        <p>아직 등록된 게시물이 없어요.<br>위에서 사진을 추가해보세요!</p>
      </div>`;
    return;
  }

  list.innerHTML = posts.map((p, i) => `
    <div class="post-item" id="post-${p.id}" data-id="${p.id}">
      <img class="post-thumb" src="${p.src}" alt="">
      <div class="post-info">
        <div class="post-index">#${String(i+1).padStart(2,'0')} · ${new Date(p.createdAt).toLocaleDateString('ko-KR')}</div>
        <div class="post-name">${p.name}</div>
      </div>
      <div class="privacy-switch">
        <label class="switch">
          <input type="checkbox" ${p.isPrivate ? 'checked' : ''} data-id="${p.id}" class="privacy-checkbox">
          <div class="switch-track"></div>
          <div class="switch-thumb"></div>
        </label>
        <span class="privacy-label" style="color:${p.isPrivate ? 'var(--private)' : 'var(--public)'}">
          ${p.isPrivate ? '나만' : '공개'}
        </span>
      </div>
      <button class="delete-btn" data-id="${p.id}">✕</button>
    </div>
  `).join('');

  // 이벤트 위임으로 안전하게 처리
  list.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', () => deletePost(btn.dataset.id));
  });
  list.querySelectorAll('.privacy-checkbox').forEach(cb => {
    cb.addEventListener('change', () => togglePrivacy(cb.dataset.id));
  });
}

// ── RENDER STATS ──
function renderStats() {
  const pub = posts.filter(p => !p.isPrivate).length;
  const priv = posts.filter(p => p.isPrivate).length;
  document.getElementById('stat-total').textContent = posts.length;
  document.getElementById('stat-public').textContent = pub;
  document.getElementById('stat-private').textContent = priv;
}

// ── RENDER ALL ──
function renderAll() {
  renderGrids();
  renderPostList();
  renderStats();
}

// ── INIT ──
renderAll();
</script>
</body>
</html>
